# OpenVPN Server Configuration
# Secure VPN server with SSL/TLS certificate management

# Network interface
port 1194
proto udp
dev tun

# Certificates and keys
ca /etc/openvpn/ca.crt
cert /etc/openvpn/server.crt
key /etc/openvpn/server.key
dh /etc/openvpn/dh.pem

# TLS security
tls-auth /etc/openvpn/tls-auth.key 0
tls-version-min 1.2
tls-cipher TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384

# Encryption
cipher AES-256-GCM
auth SHA256

# VPN network
server 10.8.0.0 255.255.255.0
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 8.8.8.8"
push "dhcp-option DNS 8.8.4.4"

# Network optimization - Compression
comp-lzo adaptive

# Keepalive to maintain connections
keepalive 10 120

# Certificate revocation (CRL)
crl-verify /etc/openvpn/crl.pem

# Additional security
user nobody
group nogroup
persist-key
persist-tun

# Logs
status /var/log/openvpn/openvpn-status.log
status-version 2
log /var/log/openvpn/openvpn.log
verb 3

# Disable weak algorithms (removed in OpenVPN 2.6+)
# ncp-disable

# Performance optimization
sndbuf 393216
rcvbuf 393216
push "sndbuf 393216"
push "rcvbuf 393216"

# Disable insecure options
push "block-outside-dns"

# Maximum concurrent clients (adjustable)
max-clients 100
