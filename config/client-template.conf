# OpenVPN Client Configuration
# Template for VPN clients

client
dev tun
proto udp

# Server address (will be replaced by script)
remote {{SERVER_IP}} 1194

# Automatic reconnection
resolv-retry infinite
nobind
persist-key
persist-tun

# Network optimization - Compression
comp-lzo adaptive

# Encryption (must match server)
cipher AES-256-GCM
auth SHA256

# TLS
key-direction 1
tls-version-min 1.2

# Logs
verb 3

# Performance optimization
sndbuf 393216
rcvbuf 393216

# Certificates will be added automatically by script
# <ca>, <cert>, <key>, <tls-auth>
